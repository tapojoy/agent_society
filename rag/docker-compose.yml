services:
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.38.1
    container_name: weaviate
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --scheme
      - http
    ports:
      - "8080:8080"
      - "50051:50051"
    volumes:
      - weaviate_data:/var/lib/weaviate
    env_file:
      - .env
    environment:
      DISABLE_TELEMETRY: "true"
      QUERY_DEFAULTS_LIMIT: "25"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      CLUSTER_HOSTNAME: "node1"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "false"
      AUTHENTICATION_APIKEY_ENABLED: "true"
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: "${WEAVIATE_API_KEYS}"
      AUTHENTICATION_APIKEY_USERS: "${WEAVIATE_API_USERS}"
      AUTHORIZATION_ENABLE_RBAC: "true"
      AUTHORIZATION_RBAC_ROOT_USERS: "${WEAVIATE_ROOT_USERS}"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/v1/.well-known/ready"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
volumes:
  weaviate_data:
    name: weaviate_data
